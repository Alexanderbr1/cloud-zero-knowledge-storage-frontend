<main class="auth-shell">
  <div class="auth-backdrop" aria-hidden="true"></div>

  <div class="auth-card" aria-labelledby="auth-title">
    <div class="auth-brand">
      <div class="auth-logo" aria-hidden="true">C</div>
      <div class="auth-brand-text">
        <h1 id="auth-title" class="auth-title">Cloud Files</h1>
        <p id="auth-subtitle" class="auth-subtitle">Вход и регистрация</p>
      </div>
    </div>

    <div class="auth-tabs" role="tablist" aria-label="Режим авторизации">
      <button
        id="tab-login"
        type="button"
        class="auth-tab"
        role="tab"
        [attr.aria-selected]="mode() === 'login'"
        [attr.tabindex]="mode() === 'login' ? 0 : -1"
        [class.auth-tab-active]="mode() === 'login'"
        (click)="selectMode('login')"
      >
        Вход
      </button>
      <button
        id="tab-register"
        type="button"
        class="auth-tab"
        role="tab"
        [attr.aria-selected]="mode() === 'register'"
        [attr.tabindex]="mode() === 'register' ? 0 : -1"
        [class.auth-tab-active]="mode() === 'register'"
        (click)="selectMode('register')"
      >
        Регистрация
      </button>
    </div>

    <div
      id="auth-form-panel"
      role="tabpanel"
      [attr.aria-labelledby]="mode() === 'login' ? 'tab-login' : 'tab-register'"
    >
      <form class="auth-form" [formGroup]="credentialsForm()" (ngSubmit)="onSubmit()" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="auth-email">Электронная почта</label>
          <input
            id="auth-email"
            class="auth-input"
            type="email"
            autocomplete="username"
            formControlName="email"
            placeholder="email@example.com"
            enterkeyhint="done"
          />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="auth-password">Пароль</label>
          <input
            id="auth-password"
            class="auth-input"
            type="password"
            [attr.autocomplete]="mode() === 'register' ? 'new-password' : 'current-password'"
            formControlName="password"
            placeholder="Минимум 8 символов при регистрации"
            enterkeyhint="go"
          />
        </div>

        @if (errorText()) {
          <p class="auth-error" role="alert">{{ errorText() }}</p>
        }

        <button type="submit" class="auth-submit" [disabled]="isSubmitting() || credentialsForm().invalid">
          {{
            isSubmitting()
              ? mode() === 'register'
                ? 'Создаём аккаунт…'
                : 'Входим…'
              : mode() === 'register'
                ? 'Продолжить'
                : 'Войти'
          }}
        </button>
      </form>
    </div>

    <p class="auth-hint">Нажимая кнопку, вы принимаете условия сервиса (демо).</p>
  </div>
</main>
