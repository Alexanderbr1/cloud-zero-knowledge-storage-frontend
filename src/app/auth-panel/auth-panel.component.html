<div class="auth-shell">

  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-logo" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M15.5 8.5a5.5 5.5 0 0 0-11 0A4 4 0 0 0 4 16h12a3.5 3.5 0 0 0-.5-7.5z" fill="currentColor"/>
        </svg>
      </div>
      <span class="auth-brand-name">Cloud Storage</span>
    </div>

    <!-- Title -->
    <h1 class="auth-title" id="auth-title">
      {{ mode() === 'login' ? 'Войдите в аккаунт' : 'Создать аккаунт' }}
    </h1>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist" aria-label="Режим авторизации">
      <button
        type="button"
        role="tab"
        class="auth-tab"
        [class.auth-tab--active]="mode() === 'login'"
        [attr.aria-selected]="mode() === 'login'"
        (click)="selectMode('login')"
      >Вход</button>
      <button
        type="button"
        role="tab"
        class="auth-tab"
        [class.auth-tab--active]="mode() === 'register'"
        [attr.aria-selected]="mode() === 'register'"
        (click)="selectMode('register')"
      >Регистрация</button>
    </div>

    <!-- Form -->
    <form class="auth-form" [formGroup]="credentialsForm()" (ngSubmit)="onSubmit()" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="auth-email">Email</label>
        <input
          id="auth-email"
          class="input"
          type="email"
          autocomplete="username"
          formControlName="email"
          placeholder="you@example.com"
          enterkeyhint="next"
        />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="auth-password">Пароль</label>
        <input
          id="auth-password"
          class="input"
          type="password"
          [attr.autocomplete]="mode() === 'register' ? 'new-password' : 'current-password'"
          formControlName="password"
          [placeholder]="mode() === 'register' ? 'Минимум 8 символов' : 'Ваш пароль'"
          enterkeyhint="go"
        />
      </div>

      @if (errorText()) {
        <div class="alert alert--error" role="alert">{{ errorText() }}</div>
      }

      <button
        type="submit"
        class="btn btn--primary btn--lg auth-submit"
        [disabled]="isSubmitting() || credentialsForm().invalid"
      >
        {{ isSubmitting()
            ? (mode() === 'register' ? 'Создаём аккаунт…' : 'Входим…')
            : (mode() === 'register' ? 'Создать аккаунт' : 'Войти') }}
      </button>
    </form>

    <p class="auth-hint">Используя сервис, вы принимаете условия (демо).</p>
  </div>

</div>
