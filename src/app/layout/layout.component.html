<a href="#main-content" class="skip-link">Перейти к содержимому</a>

<div class="app-shell">

  <!-- Top Navigation -->
  <header class="nav" role="banner">
    <div class="nav__inner">

      <!-- Logo -->
      <a routerLink="/files" class="nav__logo" aria-label="EncryptDrive — главная" (click)="closeMenu()">
        <div class="nav__logo-mark" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2.5" y="7" width="11" height="8" rx="1.5" fill="white" opacity="0.95"/>
            <path d="M4.5 7V5.5a3.5 3.5 0 0 1 7 0V7" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="8" cy="11" r="1.2" fill="var(--c-primary)"/>
          </svg>
        </div>
        <span class="nav__logo-text">EncryptDrive</span>
      </a>

      <!-- Desktop nav links -->
      <nav class="nav__links" aria-label="Основная навигация">
        <a routerLink="/files"  routerLinkActive="nav__link--active" class="nav__link">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" class="nav__link-icon">
            <path d="M1.5 4A1.5 1.5 0 0 1 3 2.5h2.94a1.5 1.5 0 0 1 1.06.44l.56.56a1.5 1.5 0 0 0 1.06.44H11A1.5 1.5 0 0 1 12.5 5.5v5A1.5 1.5 0 0 1 11 12H3A1.5 1.5 0 0 1 1.5 10.5V4z" stroke="currentColor" stroke-width="1.25"/>
          </svg>
          Мой диск
        </a>
        <a routerLink="/shared" routerLinkActive="nav__link--active" class="nav__link">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" class="nav__link-icon">
            <circle cx="5" cy="4.5" r="2" stroke="currentColor" stroke-width="1.25"/>
            <path d="M1.5 12c0-2 1.6-3.5 3.5-3.5s3.5 1.5 3.5 3.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
            <path d="M9.5 2.5a2 2 0 1 1 0 4M12.5 12c0-2-1.3-3.4-3-3.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
          </svg>
          Доступные мне
        </a>
        <a routerLink="/trash"  routerLinkActive="nav__link--active" class="nav__link">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" class="nav__link-icon">
            <path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M3.5 3.5l.5 8.5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5l.5-8.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Корзина
        </a>
      </nav>

      <!-- Right side -->
      <div class="nav__right">

        <!-- User menu (desktop) -->
        <div class="nav__user nav__user--desktop">
          <button
            type="button"
            class="nav__avatar"
            [class.nav__avatar--active]="isUserMenuOpen()"
            [attr.aria-label]="'Профиль: ' + userEmail()"
            [attr.aria-expanded]="isUserMenuOpen()"
            (click)="toggleUserMenu($event)"
          >{{ userInitial() }}</button>

          @if (isUserMenuOpen()) {
            <div class="nav__user-menu" role="menu" (click)="$event.stopPropagation()">
              <div class="nav__user-info">
                <div class="nav__user-avatar-lg">{{ userInitial() }}</div>
                <div class="nav__user-details">
                  <span class="nav__user-email">{{ userEmail() }}</span>
                  <span class="nav__user-label text-xs text-muted">Аккаунт</span>
                </div>
              </div>
              <hr class="nav__user-divider">
              <a routerLink="/profile" class="nav__user-item" role="menuitem" (click)="isUserMenuOpen.set(false)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <circle cx="7" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
                  <path d="M2 12c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
                Профиль
              </a>
              <button type="button" class="nav__user-item nav__user-item--danger" role="menuitem" (click)="logout()">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M5.5 2H3a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h2.5M9.5 10l2.5-3L9.5 4M12 7H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Выйти
              </button>
            </div>
          }
        </div>

        <!-- Hamburger (mobile) -->
        <button
          type="button"
          class="nav__hamburger"
          [class.nav__hamburger--open]="isMenuOpen()"
          [attr.aria-expanded]="isMenuOpen()"
          aria-controls="mobile-nav"
          aria-label="Открыть меню"
          (click)="toggleMenu()"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>

      </div>
    </div>
  </header>

  <!-- Mobile nav dropdown -->
  @if (isMenuOpen()) {
    <div
      class="mobile-nav"
      id="mobile-nav"
      role="navigation"
      aria-label="Мобильное меню"
    >
      <a routerLink="/files"   routerLinkActive="mobile-nav__link--active" class="mobile-nav__link" (click)="closeMenu()">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M1.5 4A1.5 1.5 0 0 1 3 2.5h2.94a1.5 1.5 0 0 1 1.06.44l.56.56a1.5 1.5 0 0 0 1.06.44H11A1.5 1.5 0 0 1 12.5 5.5v5A1.5 1.5 0 0 1 11 12H3A1.5 1.5 0 0 1 1.5 10.5V4z" stroke="currentColor" stroke-width="1.3"/>
        </svg>
        Мой диск
      </a>
      <a routerLink="/shared"  routerLinkActive="mobile-nav__link--active" class="mobile-nav__link" (click)="closeMenu()">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="5" cy="4.5" r="2" stroke="currentColor" stroke-width="1.3"/>
          <path d="M1.5 12c0-2 1.6-3.5 3.5-3.5s3.5 1.5 3.5 3.5M9.5 2.5a2 2 0 1 1 0 4M12.5 12c0-2-1.3-3.4-3-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Доступные мне
      </a>
      <a routerLink="/trash"   routerLinkActive="mobile-nav__link--active" class="mobile-nav__link" (click)="closeMenu()">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 3.5h10M5.5 3.5V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M3.5 3.5l.5 8.5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5l.5-8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Корзина
      </a>
      <hr class="mobile-nav__divider">
      <div class="mobile-nav__user">
        <div class="mobile-nav__avatar">{{ userInitial() }}</div>
        <span class="mobile-nav__user-email text-sm">{{ userEmail() }}</span>
      </div>
      <a routerLink="/profile" routerLinkActive="mobile-nav__link--active" class="mobile-nav__link" (click)="closeMenu()">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="7" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M2 12c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Профиль
      </a>
      <button type="button" class="mobile-nav__link mobile-nav__logout" (click)="logout(); closeMenu()">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M5.5 2H3a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h2.5M9.5 10l2.5-3L9.5 4M12 7H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Выйти
      </button>
    </div>
    <!-- Backdrop -->
    <div class="mobile-nav-backdrop" aria-hidden="true" (click)="closeMenu()"></div>
  }

  <!-- Page content -->
  <main class="app-content" role="main" id="main-content" tabindex="-1">
    <router-outlet />
  </main>

</div>
