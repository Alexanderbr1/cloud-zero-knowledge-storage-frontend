<div class="app-shell">
  <!-- Top Navigation -->
  <header class="nav" role="banner">
    <div class="nav__inner">
      <!-- Logo -->
      <a routerLink="/files" class="nav__logo" aria-label="Cloud Storage — главная">
        <div class="nav__logo-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M15.5 8.5a5.5 5.5 0 0 0-11 0A4 4 0 0 0 4 16h12a3.5 3.5 0 0 0-.5-7.5z" fill="currentColor"/>
          </svg>
        </div>
        <span class="nav__logo-text">Cloud</span>
      </a>

      <!-- Nav links -->
      <nav class="nav__links" aria-label="Основная навигация">
        <a routerLink="/files" routerLinkActive="nav__link--active" class="nav__link">Файлы</a>
        <a routerLink="/shared" routerLinkActive="nav__link--active" class="nav__link">Входящие</a>
      </nav>

      <!-- Right side -->
      <div class="nav__right">
        <!-- Profile avatar -->
        <a
          routerLink="/profile"
          class="nav__avatar"
          [class.nav__avatar--active]="false"
          [attr.aria-label]="'Профиль: ' + userEmail()"
          [attr.title]="userEmail()"
        >
          {{ userInitial() }}
        </a>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="app-content" role="main">
    <router-outlet />
  </main>
</div>
