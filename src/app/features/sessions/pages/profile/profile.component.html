<div class="page-container">

  <!-- Page header -->
  <div class="page-header">
    <div class="breadcrumb">
      <a routerLink="/files" class="breadcrumb__back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Мой диск
      </a>
      <span class="breadcrumb__sep" aria-hidden="true">/</span>
      <span class="breadcrumb__current">Профиль</span>
    </div>
  </div>

  <!-- User card -->
  <div class="user-card card">
    <div class="user-avatar">{{ userInitial() }}</div>
    <div class="user-info">
      <div class="user-email">{{ email() }}</div>
      <div class="text-secondary text-sm">Аккаунт активен</div>
    </div>
    <div class="user-actions">
      <button type="button" class="btn btn--secondary" (click)="logout()">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <path d="M5.5 13H2.5a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h3M10 10.5l3-3-3-3M13 7.5H5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Выйти
      </button>
    </div>
  </div>

  <!-- Sessions -->
  <div class="section-title">Активные сессии</div>
  <app-sessions />

</div>
