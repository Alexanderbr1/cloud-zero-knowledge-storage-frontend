<div class="modal-backdrop" (click)="cancelled.emit()">
  <div class="modal-card" role="dialog" aria-modal="true"
       (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-header__text">
        <h2 class="modal-title">{{ title() }}</h2>
        @if (subtitle()) {
          <p class="modal-subtitle" [attr.title]="subtitle()">{{ subtitle() }}</p>
        }
      </div>
      <button type="button" class="btn btn--ghost btn--sm btn--icon modal-close"
              aria-label="Закрыть" (click)="cancelled.emit()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <hr class="modal-divider">

    <div class="modal-section">
      <input
        type="text"
        class="form-input modal-input"
        [placeholder]="placeholder()"
        [value]="value()"
        [disabled]="loading()"
        (input)="value.set($any($event.target).value)"
        (keydown.enter)="onConfirm()"
        (keydown.escape)="cancelled.emit()"
      />
      @if (error()) {
        <p class="modal-error" role="alert">{{ error() }}</p>
      }
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn--secondary btn--sm"
              [disabled]="loading()"
              (click)="cancelled.emit()">Отмена</button>
      <button type="button" class="btn btn--primary btn--sm"
              [disabled]="loading() || !value().trim()"
              (click)="onConfirm()">
        {{ loading() ? '…' : confirmLabel() }}
      </button>
    </div>

  </div>
</div>
