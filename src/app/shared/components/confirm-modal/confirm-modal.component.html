<div class="modal-backdrop" (click)="!loading() && cancelled.emit()">
  <div class="modal-card" role="alertdialog" aria-modal="true"
       (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2a8 8 0 1 0 0 16A8 8 0 0 0 10 2zm0 4.5v4M10 13.5h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="modal-header__text">
        <h2 class="modal-title">{{ title() }}</h2>
        @if (body()) {
          <p class="modal-body">{{ body() }}</p>
        }
      </div>
      <button type="button" class="btn btn--ghost btn--sm btn--icon modal-close"
              aria-label="Закрыть" [disabled]="loading()" (click)="cancelled.emit()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn--secondary btn--sm"
              [disabled]="loading()" (click)="cancelled.emit()">Отмена</button>
      <button type="button" class="btn btn--danger btn--sm"
              [disabled]="loading()" (click)="confirmed.emit()">
        {{ loading() ? '…' : confirmLabel() }}
      </button>
    </div>

  </div>
</div>
