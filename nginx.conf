server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options    "nosniff"                          always;
  add_header X-Frame-Options           "DENY"                             always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

  location /blobs/ {
    proxy_pass http://host.docker.internal:9000;
    proxy_set_header Host $http_host;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 0;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://host.docker.internal:8080/v1/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
